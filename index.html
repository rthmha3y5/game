<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Сансрын Дайн</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#00010a;touch-action:none;}
#root{width:100%;height:100%;display:flex;flex-direction:column;}
#wrap{position:relative;flex:1;min-height:0;overflow:hidden;}
#gc{display:block;width:100%;height:100%;}
#scanlines{position:absolute;inset:0;pointer-events:none;z-index:3;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.07) 2px,rgba(0,0,0,0.07) 4px);}
#vignette{position:absolute;inset:0;pointer-events:none;z-index:4;background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,15,0.65) 100%);}
#hud{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;padding:7px 10px;pointer-events:none;font-family:'Courier New',monospace;z-index:6;gap:4px;}
.hc{background:rgba(0,5,20,0.78);border:1px solid rgba(50,130,255,0.22);border-radius:5px;padding:3px 8px;display:flex;flex-direction:column;}
.hl{font-size:7px;color:rgba(60,140,255,0.55);letter-spacing:2px;text-transform:uppercase;}
.hv{font-size:13px;font-weight:700;color:#7dd4ff;letter-spacing:1px;line-height:1.3;}
.hv.gold{color:#ffd060;}.hv.red{color:#ff6688;}
#pause-btn{position:absolute;top:8px;right:8px;width:36px;height:36px;border:1px solid rgba(80,140,255,0.3);border-radius:8px;background:rgba(0,10,40,0.7);color:rgba(120,180,255,0.8);font-size:14px;display:flex;align-items:center;justify-content:center;z-index:7;cursor:pointer;touch-action:manipulation;}
#pause-btn:active{background:rgba(20,60,160,0.5);}
/* Joystick */
#jzone{position:absolute;bottom:10px;left:10px;width:110px;height:110px;z-index:8;touch-action:none;}
#jbase{position:absolute;inset:0;border-radius:50%;background:rgba(20,60,160,0.18);border:1.5px solid rgba(60,130,255,0.28);}
#jstick{position:absolute;width:46px;height:46px;border-radius:50%;background:rgba(40,100,220,0.45);border:1.5px solid rgba(100,180,255,0.5);top:50%;left:50%;transform:translate(-50%,-50%);transition:background 0.1s;}
#jstick.active{background:rgba(60,140,255,0.65);}
/* Fire button */
#fire-btn{position:absolute;bottom:16px;right:14px;width:76px;height:76px;border-radius:50%;background:rgba(180,100,0,0.25);border:2px solid rgba(255,180,0,0.4);color:rgba(255,210,80,0.95);font-size:11px;font-family:'Courier New',monospace;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:8;cursor:pointer;touch-action:none;letter-spacing:1px;gap:2px;}
#fire-btn.firing{background:rgba(220,140,0,0.4);border-color:rgba(255,220,60,0.7);}
#fire-icon{font-size:22px;line-height:1;}
/* Power-up icons in HUD */
#pup-hud{position:absolute;bottom:0;left:50%;transform:translateX(-50%);display:flex;gap:6px;padding:4px 8px;z-index:6;pointer-events:none;}
.pup-slot{width:30px;height:30px;border-radius:6px;border:1px solid rgba(255,255,255,0.15);background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;font-size:15px;opacity:0.4;}
.pup-slot.on{opacity:1;border-color:rgba(255,220,80,0.6);}
/* Overlay */
#ovl{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,2,12,0.94);gap:16px;z-index:20;padding:24px;}
#ovl h2{font-family:'Courier New',monospace;color:#7dd4ff;font-size:22px;font-weight:700;letter-spacing:4px;text-align:center;}
#ovl p{font-family:'Courier New',monospace;color:rgba(80,150,220,0.7);font-size:11px;text-align:center;line-height:2.4;letter-spacing:0.5px;}
.hi{font-family:'Courier New',monospace;color:#ffd060;font-size:14px;letter-spacing:2px;}
#sbtn{padding:13px 44px;border:1px solid rgba(80,170,255,0.4);border-radius:8px;background:rgba(20,70,180,0.2);color:#88ccff;font-family:'Courier New',monospace;font-size:15px;letter-spacing:2px;cursor:pointer;touch-action:manipulation;}
#sbtn:active{background:rgba(20,70,180,0.4);}
/* Pause overlay */
#povl{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,2,12,0.88);gap:20px;z-index:19;}
#povl h3{font-family:'Courier New',monospace;color:#7dd4ff;font-size:18px;letter-spacing:4px;}
#povl button{padding:11px 36px;border:1px solid rgba(80,170,255,0.35);border-radius:7px;background:rgba(20,70,180,0.18);color:#88ccff;font-family:'Courier New',monospace;font-size:14px;letter-spacing:2px;cursor:pointer;touch-action:manipulation;}
#povl button:active{background:rgba(20,70,180,0.38);}
/* Wave banner */
#wbanner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;z-index:15;opacity:0;transition:opacity 0.25s;}
#wbanner .wt{font-family:'Courier New',monospace;font-size:20px;font-weight:700;color:#fff;letter-spacing:3px;}
#wbanner .ws{font-family:'Courier New',monospace;font-size:11px;color:rgba(140,200,255,0.8);letter-spacing:2px;margin-top:4px;}
</style>
</head>
<body>
<div id="root">
  <div id="wrap">
    <canvas id="gc"></canvas>
    <div id="scanlines"></div>
    <div id="vignette"></div>
    <div id="hud">
      <div class="hc"><div class="hl">ОНОО</div><div class="hv" id="sc">0</div></div>
      <div class="hc"><div class="hl">ТҮВШИН</div><div class="hv gold" id="lv">1</div></div>
      <div class="hc"><div class="hl">АМЬДРАЛ</div><div class="hv red" id="hp">♥ ♥ ♥</div></div>
    </div>
    <div id="pause-btn">⏸</div>
    <div id="pup-hud">
      <div class="pup-slot" id="slot-rapid">⚡</div>
      <div class="pup-slot" id="slot-shield">🛡</div>
      <div class="pup-slot" id="slot-triple">✦</div>
    </div>
    <!-- Joystick -->
    <div id="jzone"><div id="jbase"></div><div id="jstick"></div></div>
    <!-- Fire button -->
    <div id="fire-btn"><div id="fire-icon">🔥</div><span>БУУДАХ</span></div>
    <!-- Wave banner -->
    <div id="wbanner"><div class="wt" id="wt"></div><div class="ws" id="ws"></div></div>
    <!-- Pause overlay -->
    <div id="povl"><h3>⏸ ТҮР ЗОГССОН</h3><button id="resumebtn">▶ ҮРГЭЛЖЛҮҮЛЭХ</button></div>
    <!-- Main overlay -->
    <div id="ovl">
      <h2>✦ САНСРЫН ДАЙН ✦</h2>
      <p>Зүүн — хөдлөх хуруугаар<br>Баруун — 🔥 БУУДАХ дарна</p>
      <div class="hi" id="hisc"></div>
      <button id="sbtn">▶ ЭХЛЭХ</button>
    </div>
  </div>
</div>

<script>
const canvas=document.getElementById('gc'), ctx=canvas.getContext('2d');
let W,H;
function resize(){const wr=canvas.parentElement;W=wr.clientWidth;H=wr.clientHeight;canvas.width=W;canvas.height=H;}
resize();

// Elements
const scEl=document.getElementById('sc'),lvEl=document.getElementById('lv'),hpEl=document.getElementById('hp');
const ovl=document.getElementById('ovl'),hiEl=document.getElementById('hisc');
const wbanner=document.getElementById('wbanner'),wtEl=document.getElementById('wt'),wsEl=document.getElementById('ws');
const povl=document.getElementById('povl');
const slotRapid=document.getElementById('slot-rapid'),slotShield=document.getElementById('slot-shield'),slotTriple=document.getElementById('slot-triple');

let hiScore=+localStorage.getItem('sansarHi')||0;
if(hiScore) hiEl.textContent='Дээд оноо: '+hiScore;

// Input state
const keys={};
let joystickDX=0; // -1..1 from virtual joystick
let autoFiring=false;
let paused=false;

// Shake
let shakeX=0,shakeY=0,shakeMag=0;
function shake(m){shakeMag=Math.max(shakeMag,m);}

// Nebula
let nebula=[];
function buildNebula(){
  nebula=Array.from({length:6},(_,i)=>({
    x:Math.random()*W,y:Math.random()*H,
    rx:60+Math.random()*110,ry:40+Math.random()*80,
    col:['rgba(30,10,80,','rgba(0,40,80,','rgba(60,0,40,','rgba(0,30,60,','rgba(40,20,70,','rgba(0,50,40,'][i],
    a:0.11+Math.random()*0.13,sp:0.04+Math.random()*0.06,t:Math.random()*Math.PI*2
  }));
}

// Game state
const G={
  state:'idle',score:0,lives:3,level:1,frame:0,
  player:null,bullets:[],eBullets:[],enemies:[],particles:[],
  powerups:[],stars:[],
  shootCD:0,shieldFlash:0,combo:0,comboT:0,
  boss:null,bossMaxHP:0,wave:0,
  screenFlash:0,screenFlashCol:'#fff',
  // power-up timers
  rapidTimer:0, shieldTimer:0, tripleUnlocked:false,
  // difficulty scaling helper
  get spd(){ return Math.max(0.5, 1 - (this.level-1)*0.07); } // enemy speed multiplier starts easy
};

function initGame(){
  resize();
  Object.assign(G,{
    score:0,lives:3,level:1,frame:0,wave:0,
    bullets:[],eBullets:[],enemies:[],particles:[],powerups:[],
    shootCD:0,shieldFlash:0,combo:0,comboT:0,
    boss:null,bossMaxHP:0,screenFlash:0,
    rapidTimer:0,shieldTimer:0,tripleUnlocked:false
  });
  G.player={x:W/2,y:H-70,w:36,h:46,vx:0,speed:6.2,inv:0,hitR:14};
  G.stars=Array.from({length:120},()=>({
    x:Math.random()*W,y:Math.random()*H,
    r:Math.random()*1.6+0.2,sp:Math.random()*1.2+0.3,
    a:Math.random(),tw:Math.random()*Math.PI*2,
    col:Math.random()<0.13?(Math.random()<0.5?'#ffd0a0':'#a0c0ff'):'#ffffff'
  }));
  buildNebula();
  updateHUD();
  updatePupHUD();
  showWaveBanner('БЭЛТГЭЛ', 'ЭХЛЭХ БОЛЖ БАЙНА...');
  setTimeout(()=>spawnWave(),1200);
}

function spawnWave(){
  G.wave++;G.enemies=[];G.boss=null;
  const isBoss=G.wave%5===0;
  showWaveBanner(
    isBoss ? '⚠ БОСС ⚠' : `ДАВАЛГА ${G.wave}`,
    isBoss ? `ТҮВШИН ${G.level} — АНХААР!` : `ТҮВШИН ${G.level}`
  );
  if(isBoss){
    G.bossMaxHP=22+G.level*12;
    G.boss={x:W/2,y:95,w:82,h:64,hp:G.bossMaxHP,dx:(1.1+G.level*0.18)*G.spd,sin:0,sT:48,phase:0};
    G.screenFlash=18;G.screenFlashCol='#ff0033';
    return;
  }
  const cols=Math.min(8,4+Math.floor(G.level/2));
  const rows=Math.min(4,2+Math.floor(G.level/2));
  const gx=(W-70)/cols;
  const baseSpeed=(0.7+G.level*0.15)*G.spd;
  for(let r=0;r<rows;r++)
    for(let c=0;c<cols;c++)
      G.enemies.push({
        x:35+c*gx+gx/2,y:50+r*40,
        w:30,h:24,type:r%4,
        dx:baseSpeed*(c%2?1:-1),
        sT:60+Math.random()*90,t:Math.random()*Math.PI*2
      });
}

function showWaveBanner(title,sub){
  wtEl.textContent=title;wsEl.textContent=sub;
  wbanner.style.opacity='1';
  clearTimeout(wbanner._t);
  wbanner._t=setTimeout(()=>{wbanner.style.opacity='0';},1600);
}

// Particles
function fx(x,y,col,n=14){
  for(let i=0;i<n;i++){
    const a=Math.PI*2*i/n+Math.random()*0.5,sp=Math.random()*3.5+1;
    G.particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,col,sz:Math.random()*2.8+1,type:'burst'});
  }
}
function fxRing(x,y,col,r){G.particles.push({x,y,vx:0,vy:0,life:1,col,sz:r,type:'ring',maxR:r});}
function fxSpark(x,y,col,n=8){
  for(let i=0;i<n;i++){
    const a=Math.PI*2*i/n;
    G.particles.push({x,y,vx:Math.cos(a)*(3+Math.random()*2),vy:Math.sin(a)*(3+Math.random()*2),life:1,col,sz:1.5,type:'spark'});
  }
}
function fxText(x,y,text,col){G.particles.push({x,y,vx:0,vy:-1.2,life:1,col,sz:14,type:'text',text});}

// Power-ups
const PUP_TYPES=['rapid','shield','triple'];
function spawnPowerup(x,y){
  const type=PUP_TYPES[Math.floor(Math.random()*PUP_TYPES.length)];
  G.powerups.push({x,y,type,vy:1.2,t:0,life:1,collected:false});
}
function updatePupHUD(){
  slotRapid.className='pup-slot'+(G.rapidTimer>0?' on':'');
  slotShield.className='pup-slot'+(G.shieldTimer>0?' on':'');
  slotTriple.className='pup-slot'+(G.tripleUnlocked?' on':'');
}

function updateHUD(){
  scEl.textContent=G.score.toLocaleString();
  lvEl.textContent=G.level;
  hpEl.textContent=G.lives>0?('♥ '.repeat(G.lives)).trim():'✗';
}

function die(){
  G.state='dead';
  if(G.score>hiScore){hiScore=G.score;localStorage.setItem('sansarHi',hiScore);}
  hiEl.textContent='Дээд оноо: '+hiScore;
  ovl.querySelector('h2').textContent='✕ ТОГЛООМ ДУУСАВ';
  ovl.querySelector('p').textContent='Таны оноо: '+G.score.toLocaleString();
  ovl.style.display='flex';
  document.getElementById('sbtn').textContent='▶ ДАХИН';
}

function update(){
  G.frame++;
  const p=G.player;
  G.comboT=Math.max(0,G.comboT-1);
  if(!G.comboT)G.combo=0;
  if(p.inv>0)p.inv--;
  if(G.screenFlash>0)G.screenFlash--;
  if(G.rapidTimer>0){G.rapidTimer--;if(!G.rapidTimer)updatePupHUD();}
  if(G.shieldTimer>0){G.shieldTimer--;if(!G.shieldTimer)updatePupHUD();}

  // screen shake
  if(shakeMag>0){
    shakeX=(Math.random()-0.5)*shakeMag*2;shakeY=(Math.random()-0.5)*shakeMag*2;
    shakeMag*=0.8;if(shakeMag<0.3)shakeMag=0;
  } else {shakeX=0;shakeY=0;}

  // player movement — joystick + keys
  const joyL=joystickDX<-0.15, joyR=joystickDX>0.15;
  const goL=keys['ArrowLeft']||keys['a']||keys['A']||joyL;
  const goR=keys['ArrowRight']||keys['d']||keys['D']||joyR;
  if(joyL||joyR){
    // proportional joystick speed
    p.vx=joystickDX*p.speed;
  } else if(goL){
    p.vx=Math.max(p.vx-0.6,-p.speed);
  } else if(goR){
    p.vx=Math.min(p.vx+0.6,p.speed);
  } else {
    p.vx*=0.80;
  }
  p.x=Math.max(22,Math.min(W-22,p.x+p.vx));

  // shooting — auto fire when holding
  G.shootCD=Math.max(0,G.shootCD-1);
  const fireKey=keys[' ']||keys['z']||keys['Z']||keys['x']||autoFiring;
  const rapid=G.rapidTimer>0;
  if(fireKey&&G.shootCD===0){
    const triple=G.level>=3||G.tripleUnlocked;
    G.bullets.push({x:p.x,y:p.y-26,dy:-14,dx:0,w:3,col:'#00ffcc',trail:[]});
    if(triple){
      G.bullets.push({x:p.x-14,y:p.y-12,dy:-12,dx:-1.3,w:2.4,col:'#44aaff',trail:[]});
      G.bullets.push({x:p.x+14,y:p.y-12,dy:-12,dx:1.3,w:2.4,col:'#44aaff',trail:[]});
    }
    G.shootCD=rapid?5:10;
  }

  // nebula drift
  nebula.forEach(n=>{n.t+=n.sp*0.01;n.x+=Math.sin(n.t)*0.14;n.y+=0.04;if(n.y>H+n.ry)n.y=-n.ry;});

  // stars
  G.stars.forEach(s=>{s.y+=s.sp;if(s.y>H){s.y=0;s.x=Math.random()*W;}s.tw+=0.05;s.a=0.3+0.6*Math.abs(Math.sin(s.tw));});

  // bullet trails
  G.bullets.forEach(b=>{
    if(b.trail){b.trail.push({x:b.x,y:b.y});if(b.trail.length>7)b.trail.shift();}
    b.x+=(b.dx||0);b.y+=b.dy;
  });
  G.bullets=G.bullets.filter(b=>b.y>-20);
  G.eBullets=G.eBullets.filter(eb=>{eb.x+=(eb.dx||0);eb.y+=eb.dy;return eb.y<H+20&&eb.x>-20&&eb.x<W+20;});
  G.particles=G.particles.filter(pt=>{
    pt.x+=pt.vx;pt.y+=pt.vy;pt.vx*=0.91;pt.vy*=0.91;pt.life-=0.03;return pt.life>0;
  });

  // power-ups
  G.powerups=G.powerups.filter(pu=>{
    pu.t+=0.06;pu.y+=pu.vy;
    if(!pu.collected&&Math.abs(pu.x-p.x)<24&&Math.abs(pu.y-p.y)<24){
      pu.collected=true;
      if(pu.type==='rapid'){G.rapidTimer=360;fxText(pu.x,pu.y-10,'ХУРДАН!','#ffdd00');}
      else if(pu.type==='shield'){G.shieldTimer=300;G.lives=Math.min(5,G.lives+1);fxText(pu.x,pu.y-10,'+♥','#ff6688');}
      else if(pu.type==='triple'){G.tripleUnlocked=true;fxText(pu.x,pu.y-10,'3 СУМ!','#44ffaa');}
      fxRing(pu.x,pu.y,'#ffd060',28);fx(pu.x,pu.y,'#ffd060',10);shake(3);
      updatePupHUD();updateHUD();
      return false;
    }
    return pu.y<H+30&&pu.life>0;
  });

  // boss
  if(G.boss){
    const b=G.boss;
    b.sin+=0.04;b.x+=b.dx;b.y=95+Math.sin(b.sin*2)*28;
    if(b.x>W-58||b.x<58)b.dx*=-1;
    b.phase=(b.phase||0)+1;b.sT--;
    if(b.sT<=0){
      const spread=G.level>3?7:5;
      for(let i=0;i<spread;i++){
        const a=(-Math.floor(spread/2)+i)*0.22;
        G.eBullets.push({x:b.x+Math.cos(a)*30,y:b.y+38,dy:Math.cos(a)*1.8+3,dx:Math.sin(a)*3,col:'#ff2255'});
      }
      b.sT=Math.max(16,46-G.level*3);
    }
    G.bullets=G.bullets.filter(bul=>{
      if(Math.abs(bul.x-b.x)<46&&Math.abs(bul.y-b.y)<36){
        b.hp--;G.score+=50;updateHUD();
        fx(bul.x,bul.y,'#ff8844',7);fxSpark(bul.x,bul.y,'#ffcc44',5);shake(3);
        if(b.hp<=0){
          for(let i=0;i<5;i++)setTimeout(()=>{
            fx(b.x+(Math.random()-0.5)*60,b.y+(Math.random()-0.5)*40,'#ff8844',20);
            fxRing(b.x,b.y,'#ff4422',40+i*15);
          },i*80);
          if(Math.random()<0.8)spawnPowerup(b.x,b.y+20);
          G.score+=700+G.level*150;G.boss=null;G.level++;
          G.screenFlash=28;G.screenFlashCol='#ffaa00';shake(14);
          updateHUD();setTimeout(spawnWave,1000);
        }
        return false;
      }
      return true;
    });
  } else {
    let edge=false;
    G.enemies.forEach(e=>{e.t+=0.03;e.x+=e.dx;if(e.x>W-16||e.x<16)edge=true;});
    if(edge)G.enemies.forEach(e=>{e.dx*=-1;e.y+=10;});
    G.enemies.forEach(e=>{
      e.sT--;
      if(e.sT<=0){
        const ec=['#ff3366','#ff6622','#aa22ff','#22ffaa'][e.type];
        G.eBullets.push({x:e.x,y:e.y+14,dy:2.4+G.level*0.22,dx:0,col:ec});
        e.sT=Math.max(20,65+Math.random()*55-G.level*3);
      }
    });
    G.bullets=G.bullets.filter(bul=>{
      let hit=false;
      G.enemies=G.enemies.filter(e=>{
        if(!hit&&Math.abs(bul.x-e.x)<17&&Math.abs(bul.y-e.y)<15){
          const ec=['#ff3366','#ff6622','#aa22ff','#22ffaa'][e.type];
          fx(e.x,e.y,ec,14);fxRing(e.x,e.y,ec,18);fxSpark(e.x,e.y,'#fff',5);shake(4);
          G.combo++;G.comboT=100;
          const pts=10+G.level*5+(G.combo>2?G.combo*5:0);
          G.score+=pts;
          if(G.combo>2)fxText(e.x,e.y-10,G.combo+'x!','#ffd060');
          // chance to drop power-up
          if(Math.random()<0.08+(G.combo>4?0.06:0))spawnPowerup(e.x,e.y);
          updateHUD();hit=true;return false;
        }
        return true;
      });
      return !hit;
    });
    G.enemies.forEach(e=>{if(e.y+e.h/2>p.y-16&&G.state==='playing')die();});
    if(G.enemies.length===0){G.level++;updateHUD();spawnWave();}
  }

  // player hit — use hitR (small hitbox = fairer on mobile)
  const shield=G.shieldTimer>0;
  if(p.inv===0){
    G.eBullets=G.eBullets.filter(eb=>{
      const dx=eb.x-p.x,dy=eb.y-p.y;
      if(dx*dx+dy*dy<p.hitR*p.hitR){
        if(shield){
          // shield absorbs one hit
          G.shieldTimer=0;fxRing(p.x,p.y,'#44ffff',32);shake(4);
          G.screenFlash=8;G.screenFlashCol='#00ffff';updatePupHUD();
          return false;
        }
        fx(p.x,p.y,'#44aaff',20);fxRing(p.x,p.y,'#88ddff',28);shake(9);
        G.lives--;p.inv=90;G.shieldFlash=22;
        G.screenFlash=16;G.screenFlashCol='#ff0044';
        updateHUD();
        if(G.lives<=0&&G.state==='playing')die();
        return false;
      }
      return true;
    });
  }
}

// ======= DRAW =======
function drawShip(x,y,w,h,fr,sf){
  const fl=4+Math.sin(fr*0.42)*3;
  // engine glow
  ctx.save();ctx.shadowBlur=18;ctx.shadowColor='#ff7700';
  ctx.fillStyle='rgba(255,120,0,0.5)';
  ctx.beginPath();ctx.ellipse(x,y+h/2+fl/2,7,fl+2,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,210,60,0.8)';
  ctx.beginPath();ctx.ellipse(x,y+h/2+fl/2-2,3.5,fl*0.5,0,0,Math.PI*2);ctx.fill();
  ctx.restore();
  // wings
  ctx.save();
  ctx.shadowBlur=sf>0?22:10;ctx.shadowColor=sf>0?'#88eeff':'#1155cc';
  ctx.fillStyle='rgba(25,75,200,0.7)';
  ctx.beginPath();ctx.moveTo(x,y+h/2);ctx.lineTo(x+w/2+7,y+h/2+4);ctx.lineTo(x+w/2,y);ctx.lineTo(x+w/3,y+h/4);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(x,y+h/2);ctx.lineTo(x-w/2-7,y+h/2+4);ctx.lineTo(x-w/2,y);ctx.lineTo(x-w/3,y+h/4);ctx.closePath();ctx.fill();
  // hull
  ctx.fillStyle='#1a62d4';
  ctx.beginPath();ctx.moveTo(x,y-h/2);ctx.lineTo(x+w/2,y+h/2);ctx.lineTo(x+w/3,y+h/4);ctx.lineTo(x,y+h/3);ctx.lineTo(x-w/3,y+h/4);ctx.lineTo(x-w/2,y+h/2);ctx.closePath();ctx.fill();
  // cockpit
  const cg=ctx.createRadialGradient(x,y-h/2+10,1,x,y-h/2+10,9);
  cg.addColorStop(0,'rgba(200,240,255,0.9)');cg.addColorStop(1,'rgba(60,140,255,0.25)');
  ctx.fillStyle=cg;ctx.beginPath();ctx.ellipse(x,y-h/2+10,6,9,0,0,Math.PI*2);ctx.fill();
  // detail lines
  ctx.strokeStyle='rgba(100,180,255,0.3)';ctx.lineWidth=0.8;
  ctx.beginPath();ctx.moveTo(x,y-h/2+22);ctx.lineTo(x+w/2-5,y+h/2-2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x,y-h/2+22);ctx.lineTo(x-w/2+5,y+h/2-2);ctx.stroke();
  ctx.restore();
  // shield ring
  if(sf>0){
    ctx.save();ctx.globalAlpha=sf/22*0.65;
    ctx.strokeStyle='#88eeff';ctx.lineWidth=2;ctx.shadowBlur=14;ctx.shadowColor='#44ddff';
    ctx.beginPath();ctx.arc(x,y,w*0.88,0,Math.PI*2);ctx.stroke();ctx.restore();
  }
  // active shield power-up overlay
  if(G.shieldTimer>0&&(G.frame%60<45)){
    ctx.save();ctx.globalAlpha=0.3;
    ctx.strokeStyle='#00ffff';ctx.lineWidth=2.5;ctx.shadowBlur=10;ctx.shadowColor='#00ffff';
    ctx.beginPath();ctx.arc(x,y,w*0.95,0,Math.PI*2);ctx.stroke();ctx.restore();
  }
}

function drawEnemy(e,fr){
  const cols=['#ff2255','#ff6600','#cc22ff','#00ffaa'],gcols=['rgba(255,30,80,','rgba(255,100,0,','rgba(180,0,255,','rgba(0,255,150,'];
  const c=cols[e.type],gc=gcols[e.type],bob=Math.sin(e.t)*2.5;
  ctx.save();ctx.translate(e.x,e.y+bob);ctx.shadowBlur=10;ctx.shadowColor=c;
  const rg=ctx.createRadialGradient(0,0,2,0,0,e.w*0.7);
  rg.addColorStop(0,gc+'0.35)');rg.addColorStop(1,gc+'0)');
  ctx.fillStyle=rg;ctx.beginPath();ctx.ellipse(0,0,e.w*0.72,e.h*0.72,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=c;
  if(e.type===0){
    ctx.beginPath();ctx.moveTo(0,-e.h/2);ctx.lineTo(e.w/2,e.h/3);ctx.lineTo(e.w/4,e.h/2);ctx.lineTo(-e.w/4,e.h/2);ctx.lineTo(-e.w/2,e.h/3);ctx.closePath();ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.5)';
    [[-e.w*0.35,-e.h*0.1],[e.w*0.35,-e.h*0.1],[0,-e.h*0.45]].forEach(([sx,sy])=>{ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(sx-3,sy+7);ctx.lineTo(sx+3,sy+7);ctx.closePath();ctx.fill();});
  } else if(e.type===1){
    ctx.beginPath();ctx.ellipse(0,0,e.w/2,e.h/2,0,0,Math.PI*2);ctx.fill();
    [[-e.w/2,-4],[e.w/2,-4]].forEach(([cx,cy])=>{ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+(cx<0?-8:8),-10);ctx.lineTo(cx+(cx<0?-4:4),2);ctx.closePath();ctx.fill();});
  } else if(e.type===2){
    ctx.beginPath();ctx.moveTo(0,-e.h/2);ctx.lineTo(e.w/2,0);ctx.lineTo(0,e.h/2);ctx.lineTo(-e.w/2,0);ctx.closePath();ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.22)';ctx.beginPath();ctx.moveTo(0,-e.h/4);ctx.lineTo(e.w/4,0);ctx.lineTo(0,e.h/4);ctx.lineTo(-e.w/4,0);ctx.closePath();ctx.fill();
  } else {
    for(let i=0;i<6;i++){const a2=Math.PI*2*i/6+fr*0.05,r2=e.w*0.38;ctx.beginPath();ctx.arc(Math.cos(a2)*r2,Math.sin(a2)*r2,4,0,Math.PI*2);ctx.fill();}
    ctx.beginPath();ctx.arc(0,0,5,0,Math.PI*2);ctx.fill();
  }
  ctx.fillStyle='rgba(255,255,255,0.65)';ctx.beginPath();ctx.arc(0,-e.h*0.06,3,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function drawBoss(b,fr){
  const hp=b.hp/G.bossMaxHP,mc=hp>0.66?'#cc1155':hp>0.33?'#dd2200':'#ff0000';
  ctx.save();ctx.translate(b.x,b.y);ctx.rotate(Math.sin(b.phase*0.02)*0.08);
  ctx.globalAlpha=0.28+0.18*Math.sin(fr*0.08);
  ctx.strokeStyle='#ff2244';ctx.lineWidth=2;ctx.shadowBlur=20;ctx.shadowColor='#ff0033';
  ctx.beginPath();ctx.arc(0,0,b.w*0.74,0,Math.PI*2);ctx.stroke();
  ctx.globalAlpha=1;
  const rg=ctx.createRadialGradient(0,0,5,0,0,b.w*0.7);
  rg.addColorStop(0,'rgba(255,0,50,0.3)');rg.addColorStop(1,'rgba(255,0,0,0)');
  ctx.fillStyle=rg;ctx.beginPath();ctx.arc(0,0,b.w*0.7,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=16;ctx.shadowColor='#ff1133';ctx.fillStyle=mc;
  ctx.beginPath();ctx.moveTo(0,-b.h/2);ctx.lineTo(b.w/2,6);ctx.lineTo(b.w/3,b.h/2);ctx.lineTo(0,b.h/3);ctx.lineTo(-b.w/3,b.h/2);ctx.lineTo(-b.w/2,6);ctx.closePath();ctx.fill();
  const cg=ctx.createRadialGradient(0,0,1,0,0,12+Math.sin(fr*0.12)*4);
  cg.addColorStop(0,'rgba(255,200,200,0.9)');cg.addColorStop(1,'rgba(255,0,50,0)');
  ctx.fillStyle=cg;ctx.beginPath();ctx.arc(0,0,14+Math.sin(fr*0.12)*4,0,Math.PI*2);ctx.fill();
  ctx.restore();
  // HP bar
  const bw=Math.min(W*0.48,116),bh=7,bx=b.x-bw/2,by=b.y-b.h/2-18;
  ctx.fillStyle='rgba(30,0,10,0.8)';ctx.fillRect(bx,by,bw,bh);
  ctx.fillStyle=hp>0.5?'#ff2255':hp>0.25?'#ff6600':'#ff0000';ctx.fillRect(bx,by,bw*hp,bh);
  ctx.strokeStyle='rgba(255,50,80,0.5)';ctx.lineWidth=1;ctx.strokeRect(bx,by,bw,bh);
}

function drawPowerup(pu){
  const cols={rapid:'#ffdd00',shield:'#44ffcc',triple:'#aa44ff'};
  const icons={rapid:'⚡',shield:'🛡',triple:'✦'};
  ctx.save();
  ctx.translate(pu.x,pu.y);
  const pulse=0.9+0.12*Math.sin(pu.t*2);
  ctx.scale(pulse,pulse);
  ctx.shadowBlur=14;ctx.shadowColor=cols[pu.type];
  ctx.strokeStyle=cols[pu.type];ctx.lineWidth=1.5;
  ctx.beginPath();
  for(let i=0;i<6;i++){const a=Math.PI/3*i+pu.t*0.5;ctx.lineTo(Math.cos(a)*14,Math.sin(a)*14);}
  ctx.closePath();ctx.stroke();
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fill();
  ctx.font='14px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(icons[pu.type],0,1);
  ctx.restore();
}

function draw(){
  ctx.save();
  ctx.translate(shakeX,shakeY);
  ctx.fillStyle='#00010a';ctx.fillRect(-12,-12,W+24,H+24);
  // nebula
  nebula.forEach(n=>{
    ctx.save();
    const ng=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.rx);
    ng.addColorStop(0,n.col+n.a+')');ng.addColorStop(1,n.col+'0)');
    ctx.fillStyle=ng;ctx.beginPath();ctx.ellipse(n.x,n.y,n.rx,n.ry,n.t*0.1,0,Math.PI*2);ctx.fill();
    ctx.restore();
  });
  // stars
  G.stars.forEach(s=>{
    const rc=s.col==='#ffffff'?`rgba(255,255,255,${s.a})`:s.col==='#ffd0a0'?`rgba(255,208,160,${s.a})`:`rgba(160,192,255,${s.a})`;
    ctx.fillStyle=rc;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();
  });
  // power-ups
  G.powerups.forEach(drawPowerup);
  // enemy bullets
  G.eBullets.forEach(b=>{
    ctx.save();ctx.shadowBlur=8;ctx.shadowColor=b.col;ctx.fillStyle=b.col;
    ctx.beginPath();ctx.ellipse(b.x,b.y,2.5,7,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.65)';ctx.beginPath();ctx.ellipse(b.x,b.y-3,1.2,2.5,0,0,Math.PI*2);ctx.fill();
    ctx.restore();
  });
  // enemies
  G.enemies.forEach(e=>drawEnemy(e,G.frame));
  if(G.boss)drawBoss(G.boss,G.frame);
  // player bullets
  G.bullets.forEach(b=>{
    if(b.trail&&b.trail.length>1){
      ctx.save();
      for(let i=1;i<b.trail.length;i++){
        const t=i/b.trail.length;
        ctx.globalAlpha=t*0.38;ctx.strokeStyle=b.col;ctx.lineWidth=b.w*t*1.5;ctx.lineCap='round';
        ctx.beginPath();ctx.moveTo(b.trail[i-1].x,b.trail[i-1].y);ctx.lineTo(b.trail[i].x,b.trail[i].y);ctx.stroke();
      }
      ctx.restore();
    }
    ctx.save();ctx.shadowBlur=12;ctx.shadowColor=b.col;ctx.fillStyle=b.col;
    ctx.beginPath();ctx.ellipse(b.x,b.y,b.w,9,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.78)';ctx.beginPath();ctx.ellipse(b.x,b.y,b.w*0.4,3.5,0,0,Math.PI*2);ctx.fill();
    ctx.restore();
  });
  // player
  const p=G.player;
  if(p.inv===0||G.frame%4<2){drawShip(p.x,p.y,p.w,p.h,G.frame,G.shieldFlash);if(G.shieldFlash>0)G.shieldFlash--;}
  // particles
  G.particles.forEach(pt=>{
    ctx.save();ctx.globalAlpha=pt.life;
    if(pt.type==='ring'){
      const pr=1-pt.life,rr=pt.maxR*pr;ctx.globalAlpha=pt.life*0.65;
      ctx.strokeStyle=pt.col;ctx.lineWidth=2;ctx.shadowBlur=8;ctx.shadowColor=pt.col;
      ctx.beginPath();ctx.arc(pt.x,pt.y,rr,0,Math.PI*2);ctx.stroke();
    } else if(pt.type==='spark'){
      ctx.strokeStyle=pt.col;ctx.lineWidth=1.2;ctx.shadowBlur=6;ctx.shadowColor=pt.col;
      ctx.beginPath();ctx.moveTo(pt.x,pt.y);ctx.lineTo(pt.x-pt.vx*4,pt.y-pt.vy*4);ctx.stroke();
    } else if(pt.type==='text'){
      ctx.fillStyle=pt.col;ctx.font=`700 ${pt.sz}px 'Courier New',monospace`;
      ctx.textAlign='center';ctx.shadowBlur=8;ctx.shadowColor=pt.col;
      ctx.fillText(pt.text,pt.x,pt.y);
    } else {
      ctx.fillStyle=pt.col;ctx.shadowBlur=5;ctx.shadowColor=pt.col;
      ctx.beginPath();ctx.arc(pt.x,pt.y,pt.sz,0,Math.PI*2);ctx.fill();
    }
    ctx.restore();
  });
  // combo text
  if(G.combo>2&&G.comboT>0){
    ctx.save();ctx.globalAlpha=Math.min(1,G.comboT/55);
    ctx.shadowBlur=16;ctx.shadowColor='#ffcc00';ctx.fillStyle='#ffd060';
    ctx.font=`700 ${12+Math.min(G.combo,8)*1.2}px 'Courier New',monospace`;
    ctx.textAlign='center';ctx.fillText(G.combo+'x COMBO!',p.x,p.y-66);
    ctx.restore();
  }
  // boss warning pulse
  if(G.boss){
    ctx.save();ctx.globalAlpha=0.45+0.4*Math.sin(G.frame*0.13);ctx.fillStyle='#ff2255';
    ctx.shadowBlur=8;ctx.shadowColor='#ff0033';ctx.font=`700 11px 'Courier New',monospace`;
    ctx.textAlign='center';ctx.fillText('⚠ БОСС ⚠',W/2,H-5);ctx.restore();
  }
  // screen flash
  if(G.screenFlash>0){
    ctx.save();ctx.globalAlpha=(G.screenFlash/28)*0.2;ctx.fillStyle=G.screenFlashCol;
    ctx.fillRect(-12,-12,W+24,H+24);ctx.restore();
  }
  ctx.restore();
}

// ======= VIRTUAL JOYSTICK =======
const jzone=document.getElementById('jzone'),jstick=document.getElementById('jstick');
let jTouchId=null,jCX=0,jCY=0;
const JR=42; // max radius

function joyPos(){const r=jzone.getBoundingClientRect();return{cx:r.left+r.width/2,cy:r.top+r.height/2};}

jzone.addEventListener('touchstart',e=>{
  if(G.state!=='playing')return;e.preventDefault();
  const t=e.changedTouches[0];jTouchId=t.identifier;
  const jp=joyPos();jCX=jp.cx;jCY=jp.cy;
  updateJoy(t.clientX,t.clientY);
  jstick.classList.add('active');
},{passive:false});

document.addEventListener('touchmove',e=>{
  if(jTouchId===null)return;
  for(const t of e.changedTouches){
    if(t.identifier===jTouchId){updateJoy(t.clientX,t.clientY);break;}
  }
},{passive:false});

document.addEventListener('touchend',e=>{
  for(const t of e.changedTouches){
    if(t.identifier===jTouchId){
      jTouchId=null;joystickDX=0;
      jstick.style.transform='translate(-50%,-50%)';
      jstick.classList.remove('active');
      break;
    }
  }
});

function updateJoy(cx,cy){
  const dx=cx-jCX,dy=cy-jCY;
  const dist=Math.min(Math.sqrt(dx*dx+dy*dy),JR);
  const angle=Math.atan2(dy,dx);
  const nx=Math.cos(angle)*dist,ny=Math.sin(angle)*dist;
  jstick.style.transform=`translate(calc(-50% + ${nx}px), calc(-50% + ${ny}px))`;
  joystickDX=nx/JR;
}

// ======= FIRE BUTTON =======
const fireBtn=document.getElementById('fire-btn');
fireBtn.addEventListener('touchstart',e=>{e.preventDefault();autoFiring=true;fireBtn.classList.add('firing');},{passive:false});
fireBtn.addEventListener('touchend',e=>{e.preventDefault();autoFiring=false;fireBtn.classList.remove('firing');},{passive:false});
fireBtn.addEventListener('touchcancel',e=>{e.preventDefault();autoFiring=false;fireBtn.classList.remove('firing');},{passive:false});
fireBtn.addEventListener('mousedown',()=>{autoFiring=true;fireBtn.classList.add('firing');});
fireBtn.addEventListener('mouseup',()=>{autoFiring=false;fireBtn.classList.remove('firing');});

// ======= PAUSE =======
const pauseBtn=document.getElementById('pause-btn'),resumeBtn=document.getElementById('resumebtn');
pauseBtn.addEventListener('click',()=>{
  if(G.state!=='playing')return;
  paused=true;G.state='paused';povl.style.display='flex';
});
pauseBtn.addEventListener('touchstart',e=>{
  e.preventDefault();if(G.state!=='playing')return;
  paused=true;G.state='paused';povl.style.display='flex';
},{passive:false});
resumeBtn.addEventListener('click',()=>{povl.style.display='none';G.state='playing';paused=false;});
resumeBtn.addEventListener('touchstart',e=>{e.preventDefault();povl.style.display='none';G.state='playing';paused=false;},{passive:false});

// ======= KEYBOARD =======
document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if([' ','ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key))e.preventDefault();
  if(e.key==='Escape'||e.key==='p'){
    if(G.state==='playing'){paused=true;G.state='paused';povl.style.display='flex';}
    else if(G.state==='paused'){povl.style.display='none';G.state='playing';paused=false;}
  }
});
document.addEventListener('keyup',e=>{keys[e.key]=false;});

// ======= GAME LOOP =======
let lastT=0;
function loop(ts){
  if(G.state==='playing'&&ts-lastT>=15){update();draw();lastT=ts;}
  requestAnimationFrame(loop);
}

// ======= START / RESIZE =======
window.addEventListener('resize',()=>{
  const ox=G.player?G.player.x/W:0.5;
  resize();
  if(G.player){G.player.x=ox*W;G.player.y=H-70;}
  if(G.state==='playing')buildNebula();
});

document.getElementById('sbtn').addEventListener('click',startGame);
document.getElementById('sbtn').addEventListener('touchstart',e=>{e.preventDefault();startGame();},{passive:false});

function startGame(){
  ovl.style.display='none';G.state='playing';initGame();
}

requestAnimationFrame(loop);
</script>
